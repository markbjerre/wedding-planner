# Served behind Traefik at https://ai-vaerksted.cloud/wedding-planner/
# No StripPrefix — browser requests keep /wedding-planner/... paths.

server {
    listen 80;
    root /usr/share/nginx/html;

    # Monitoring / load balancers (JSON, no auth)
    location = /wedding-planner/health {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 200 '{"status":"ok","service":"wedding-planner"}';
    }

    # Static assets + SPA fallback (Vite base: /wedding-planner/)
    location ^~ /wedding-planner/ {
        alias /usr/share/nginx/html/wedding-planner/;
        index index.html;
        try_files $uri $uri/ /wedding-planner/index.html;
    }

    location = /wedding-planner {
        return 301 /wedding-planner/;
    }
}
